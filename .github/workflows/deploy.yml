name: Build & Deploy to Hostgator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove committed node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: |
          sudo mkdir -p /home/ubuntu && sudo chmod 777 /home/ubuntu
          npx prisma generate

      - name: Restore yarn.lock for Next.js build compatibility
        run: printf '# THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.\n# yarn lockfile v1\n\n' > yarn.lock

      - name: Remove API routes (not supported in static export)
        run: rm -rf app/api

      - name: Build static export
        run: npm run build
        env:
          NEXT_OUTPUT_MODE: export
          NEXT_DIST_DIR: out
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_DIR }}
          dangerous-clean-slate: true
